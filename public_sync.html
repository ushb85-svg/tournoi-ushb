<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tournoi en direct</title>
<style>
:root{
  --bg:#f5f2ec;--s1:#fff;--s2:#f0ece4;--s3:#e8e3d8;
  --acc:#d42e20;--acc2:#e8552a;--gold:#c49a10;--purple:#9f7df5;
  --green:#20c368;--muted:#8a8378;--text:#2b2722;--border:#ddd6c8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sora',Arial,sans-serif;background:var(--bg);color:var(--text);padding-bottom:4rem}
.topbar{position:sticky;top:0;z-index:50;background:var(--s1);border-bottom:2px solid var(--acc);
  padding:.6rem .9rem;display:flex;align-items:center;justify-content:space-between;gap:.6rem}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.05em;color:var(--acc)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:.35rem}
.live-dot.stale{background:var(--muted)}
.tabs{display:flex;overflow-x:auto;background:var(--s1);border-bottom:1px solid var(--border);
  position:sticky;top:48px;z-index:49;-webkit-overflow-scrolling:touch}
.tab{flex-shrink:0;padding:.6rem .85rem;font-size:.72rem;font-weight:700;letter-spacing:.03em;
  color:var(--muted);border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.page{display:none;padding:.9rem}
.page.active{display:block}
.card{background:var(--s1);border-radius:12px;padding:.9rem;margin-bottom:.85rem;border:1px solid var(--border)}
.card-hd{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.04em;color:var(--acc);
  margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:2px solid var(--gold)}
.match-row{display:grid;grid-template-columns:1fr auto 1fr;gap:.4rem;align-items:center;
  padding:.55rem .3rem;border-bottom:1px solid var(--border)}
.match-row:last-child{border-bottom:none}
.m-team{font-weight:600;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-team.right{text-align:right}
.m-team.won{color:var(--green);font-weight:800}
.m-team.lost{opacity:.55}
.m-score-wrap{display:flex;flex-direction:column;align-items:center;gap:.1rem;min-width:64px}
.m-score-meta{font-size:.62rem;color:var(--muted);font-weight:600;text-align:center}
.m-score{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.04em;
  background:var(--s3);border-radius:6px;padding:.05rem .4rem;min-width:48px;text-align:center;color:var(--acc)}
.m-score.notplayed{color:var(--muted);background:transparent;font-size:.85rem}
.st-row{display:grid;grid-template-columns:24px 1fr 28px 28px 28px 36px;gap:.3rem;
  align-items:center;padding:.4rem .2rem;font-size:.78rem;border-bottom:1px solid var(--border)}
.st-row.header{font-weight:700;color:var(--muted);font-size:.65rem;text-transform:uppercase}
.st-row:last-child{border-bottom:none}
.st-row span{text-align:center}
.st-row span:nth-child(2){text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600}
.st-pts{font-weight:800;color:var(--acc)}
.empty-msg{color:var(--muted);font-style:italic;text-align:center;padding:1.5rem;font-size:.85rem}
.ticker{background:var(--acc);color:#fff;padding:.45rem .9rem;font-size:.78rem;font-weight:600;
  white-space:nowrap;overflow:hidden}
.ticker-inner{display:inline-block}
.fullscreen-btn{position:fixed;bottom:1rem;right:1rem;z-index:60;background:var(--acc);color:#fff;
  border:none;border-radius:50px;padding:.7rem 1.1rem;font-size:.78rem;font-weight:700;box-shadow:0 3px 14px rgba(0,0,0,.25)}
/* ── Styles onglet Direct — calqués sur l'onglet Affichage Admin ── */
.terrain-sep{font-size:.72rem;font-weight:700;letter-spacing:.06em;color:var(--acc);text-transform:uppercase;
  padding:.35rem .4rem .2rem;border-bottom:2px solid var(--acc);margin:.5rem 0 .25rem;opacity:.8}
.match-row{display:flex;align-items:center;gap:.5rem;padding:.55rem .3rem;border-bottom:1px solid var(--border);font-size:.83rem}
.match-row:last-child{border-bottom:none}
.match-row.islive{background:rgba(212,46,32,.05);border-left:3px solid var(--acc)}
.match-row.upcoming{border-left:3px solid rgba(196,154,16,.4)}
.match-row.done{background:rgba(32,195,104,.03);border-left:3px solid rgba(32,195,104,.3)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--acc);flex-shrink:0;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.m-time-col{font-family:"Bebas Neue",sans-serif;font-size:.9rem;letter-spacing:.04em;color:var(--muted);flex-shrink:0;min-width:38px}
.m-center{flex:1;min-width:0}
.m-teams-row{display:flex;align-items:center;gap:.35rem;flex-wrap:nowrap}
.m-team{flex:1;font-weight:600;font-size:.84rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.m-team.right{text-align:right}
.m-team.won{color:var(--green);font-weight:800}
.m-vs{flex-shrink:0;font-size:.75rem;font-weight:700;color:var(--muted)}
.m-vs.live-ind{color:var(--acc)}
.m-score-final{flex-shrink:0;font-family:"Bebas Neue",sans-serif;font-size:1.05rem;color:var(--acc);min-width:52px;text-align:center}
.m-state-col{flex-shrink:0;font-size:.6rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;min-width:52px;text-align:right}
.live-col{color:var(--acc)}
.next-col{color:var(--gold)}
.done-col{color:var(--muted)}
.ref-tag{font-size:.68rem;color:var(--muted);margin-top:.1rem;font-style:italic}
.ref-tag.live-ref{color:rgba(212,46,32,.75)}
/* ── Styles onglet Classement — finales ── */
.st-final-row{display:flex;align-items:center;gap:.4rem;padding:.45rem .3rem;border-bottom:1px solid var(--border);font-size:.83rem}
.st-final-row:last-child{border-bottom:none}
.st-final-row.played{background:rgba(32,195,104,.04)}
.st-final-row.tbd{opacity:.4}
.st-final-time{flex-shrink:0;font-family:"Bebas Neue",sans-serif;font-size:.85rem;color:var(--muted);min-width:36px}
.st-final-team{flex:1;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.st-final-team.right{text-align:right}
.st-final-team.won{color:var(--green);font-weight:800}
.st-final-score{flex-shrink:0;font-family:"Bebas Neue",sans-serif;font-size:1.1rem;color:var(--acc);min-width:54px;text-align:center}
.st-sep{height:1px;background:var(--gold);opacity:.3;margin:.2rem 0}
.st-main{background:rgba(245,194,66,.05)}
.badge{display:inline-block;font-size:.55rem;font-weight:700;padding:.1rem .35rem;border-radius:4px;margin-left:.3rem}
.b-main{background:rgba(196,154,16,.15);color:var(--gold)}
.b-consol{background:rgba(159,125,245,.15);color:var(--purple)}
.field-tag{font-size:.6rem;color:var(--muted);font-weight:600}
.config-screen{padding:2rem 1.2rem;text-align:center}
.config-screen input{width:100%;padding:.6rem;border:1px solid var(--border);border-radius:6px;margin-bottom:.6rem;font-size:.85rem}
.config-screen button{width:100%;padding:.65rem;background:var(--acc);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<!-- ═══ Écran de configuration (premier accès sans paramètres dans l'URL) ═══ -->
<div id="config-screen" class="config-screen" style="display:none">
  <h2 style="font-family:'Bebas Neue',sans-serif;color:var(--acc);margin-bottom:1rem">Configuration requise</h2>
  <p style="color:var(--muted);font-size:.85rem;margin-bottom:1rem">Ce lien n'a pas été ouvert depuis l'application principale. Renseignez les informations du dépôt.</p>
  <input type="text" id="cfg-owner" placeholder="Propriétaire GitHub">
  <input type="text" id="cfg-repo" placeholder="Nom du dépôt">
  <button onclick="manualConfig()">Valider</button>
</div>

<!-- ═══ Application publique ═══ -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="topbar-title"><span id="live-dot" class="live-dot"></span><span id="tournament-name">Tournoi</span></div>
    <div style="font-size:.7rem;color:var(--muted)" id="last-update">—</div>
    <button onclick="fetchData()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:.3rem .5rem;font-size:.7rem;cursor:pointer;color:var(--acc)">🔄</button>
  </div>
  <div class="ticker"><div class="ticker-inner" id="ticker-text">Chargement…</div></div>
  <div class="tabs">
    <div class="tab active" data-tab="live">🔴 Direct</div>
    <div class="tab" data-tab="standings">📊 Classements</div>
    <div class="tab" data-tab="planning">📅 Planning</div>
    <div class="tab" data-tab="arbitres">⚖️ Arbitres</div>
  </div>

  <div class="page active" id="page-live">
    <div class="card">
      <div class="card-hd">⏱ En cours &amp; à venir</div>
      <div id="live-upcoming"><div class="empty-msg">Chargement…</div></div>
    </div>
    <div class="card">
      <div class="card-hd">✅ Derniers résultats</div>
      <div id="live-done"><div class="empty-msg">Chargement…</div></div>
    </div>
  </div>

  <div class="page" id="page-standings">
    <div id="standings-out"><div class="empty-msg">Chargement…</div></div>
  </div>

  <div class="page" id="page-planning">
    <div style="padding:.5rem 0 .75rem">
      <select id="planning-team-filter" onchange="renderPlanning()" style="padding:.45rem .7rem;border-radius:7px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:.85rem;min-width:220px">
        <option value="">📋 Toutes les équipes</option>
      </select>
    </div>
    <div id="planning-out"><div class="empty-msg">Chargement…</div></div>
  </div>

  <div class="page" id="page-arbitres">
    <div style="padding:.5rem 0 .75rem">
      <select id="arbitres-ref-filter" onchange="renderArbitres()" style="padding:.45rem .7rem;border-radius:7px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-size:.85rem;min-width:220px">
        <option value="">⚖️ Tous les arbitres</option>
      </select>
    </div>
    <div id="arbitres-out"><div class="empty-msg">Chargement…</div></div>
  </div>

  <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ Plein écran</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// VUE PUBLIQUE — LECTURE SEULE STRICTE
// Aucune fonction d'écriture n'existe dans ce fichier : pas de saveState,
// pas d'accès à un quelconque token, pas de modification de match/score/arbitre.
// Les données sont lues exclusivement depuis tournament-data.json, mis à jour
// uniquement quand l'Admin clique sur "Publier la diffusion" (pas de polling
// automatique côté public — rechargez la page pour récupérer la dernière publication).
// ═══════════════════════════════════════════════════════════════════════════

let DATA = null; // dernier état reçu : {cfg, teams, pools, matches, arbitres, finalsValidated, tournamentValidated, ts, tickerMsg}
let lastFetchOk = false;

const pad=n=>String(n).padStart(2,'0');
const m2t=m=>m==null?'--:--':`${pad(Math.floor(m/60))}:${pad(m%60)}`;

function teamName(id){
  if(!DATA) return '?';
  if(!id||id==='TBD') return '⏳ TBD';
  if(typeof id==='string' && id.startsWith('W(')) return id;
  const t=DATA.teams.find(x=>x.id===id);
  return t?t.name:'?';
}

// ── Détermination de l'URL des données : query params ?owner=&repo= ou config locale ──
function getRepoConfig(){
  const params=new URLSearchParams(window.location.search);
  const owner=params.get('owner');
  const repo=params.get('repo');
  if(owner && repo) return {owner, repo};
  try{
    const saved=JSON.parse(localStorage.getItem('hb_public_cfg')||'{}');
    if(saved.owner && saved.repo) return saved;
  }catch(e){}
  return null;
}

function manualConfig(){
  const owner=document.getElementById('cfg-owner').value.trim();
  const repo=document.getElementById('cfg-repo').value.trim();
  if(!owner||!repo){alert('Veuillez remplir les deux champs');return;}
  localStorage.setItem('hb_public_cfg', JSON.stringify({owner,repo}));
  location.reload();
}

let REPO_CFG=null;

function dataUrl(){
  // L'API Contents de GitHub (pas raw.githubusercontent.com) : ce dernier met le
  // contenu en cache plusieurs minutes côté CDN GitHub, indépendamment du paramètre
  // anti-cache utilisé. C'était la cause exacte de la désynchronisation observée.
  // L'API Contents renvoie systématiquement la version la plus récente du fichier.
  return `https://api.github.com/repos/${REPO_CFG.owner}/${REPO_CFG.repo}/contents/tournament-data.json?ref=data&_=${Date.now()}`;
}

async function fetchData(){
  try{
    const resp=await fetch(dataUrl(),{cache:'no-store',headers:{'Accept':'application/vnd.github.v3+json'}});
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const apiData=await resp.json();
    // L'API Contents renvoie le fichier encodé en base64 dans apiData.content
    const decoded=decodeURIComponent(escape(atob(apiData.content.replace(/\n/g,''))));
    const json=JSON.parse(decoded);
    // Succès : on remplace les données affichées par la nouvelle version
    DATA=json;
    lastFetchOk=true;
    renderAll();
    updateLiveDot(true);
    _hideRefreshError();
  }catch(e){
    // Échec : on NE TOUCHE PAS à DATA — les informations actuellement affichées
    // restent visibles, conformément à la demande. On affiche juste un message discret.
    lastFetchOk=false;
    updateLiveDot(false);
    _showRefreshError();
    console.warn('Échec récupération données :', e);
  }
}

// Message discret affiché brièvement en cas d'échec du bouton Actualiser
let _refreshErrorTimer=null;
function _showRefreshError(){
  let el=document.getElementById('refresh-error-msg');
  if(!el){
    el=document.createElement('div');
    el.id='refresh-error-msg';
    el.style.cssText='position:fixed;bottom:4.5rem;right:1rem;z-index:61;background:rgba(0,0,0,.78);color:#fff;'
      +'font-size:.72rem;padding:.45rem .75rem;border-radius:8px;max-width:220px;text-align:right';
    document.body.appendChild(el);
  }
  el.textContent='⚠ Mise à jour indisponible — données actuelles conservées';
  el.style.display='block';
  clearTimeout(_refreshErrorTimer);
  _refreshErrorTimer=setTimeout(()=>{ el.style.display='none'; }, 4000);
}
function _hideRefreshError(){
  const el=document.getElementById('refresh-error-msg');
  if(el) el.style.display='none';
}

function updateLiveDot(ok){
  const dot=document.getElementById('live-dot');
  dot.className = ok ? 'live-dot' : 'live-dot stale';
  if(DATA && DATA.ts){
    const ago=Math.round((Date.now()-DATA.ts)/1000);
    document.getElementById('last-update').textContent = ago<5?'à jour':`maj il y a ${ago}s`;
  }
}

// ── RENDU : Onglet Direct — calqué sur renderDisplay() Admin ────────────────
// Même logique : passe 1 = matchs EN COURS par terrain, passe 2 = SUIVANT par terrain,
// puis résultats récents. Source : DATA (publié par Admin via GitHub).
function renderLive(){
  const now=new Date();
  const cur=now.getHours()*60+now.getMinutes();
  const isLiveM=m=>!m.played&&m.time!=null&&cur>=m.time&&cur<m.time+DATA.cfg.dur;

  // Terrains actifs (matchs non joués ou en cours, hors TBD) — identique Admin
  const fieldNums=[...new Set(
    DATA.matches.filter(m=>!m.played&&m.time!=null&&m.home!=='TBD'&&m.away!=='TBD').map(m=>m.field)
  )].sort((a,b)=>a-b);

  let uh='';

  if(fieldNums.length===0){
    // Aucun match planifié non joué : vérifier matchs en cours
    const liveOnly=DATA.matches.filter(m=>isLiveM(m)&&m.home!=='TBD'&&m.away!=='TBD');
    if(liveOnly.length){
      const livFields=[...new Set(liveOnly.map(m=>m.field))].sort((a,b)=>a-b);
      livFields.forEach(f=>{
        uh+=`<div class="terrain-sep">🏟 Terrain ${f}</div>`;
        liveOnly.filter(m=>m.field===f).forEach(m=>{
          const refText=m.referee?`<div class="ref-tag">👨‍⚖️ ${m.referee}</div>`:'';
          uh+=`<div class="match-row islive">
            <div class="live-dot"></div>
            <div class="m-time-col">${m2t(m.time)}</div>
            <div class="m-center">
              <div class="m-teams-row">
                <span class="m-team">${teamName(m.home)}</span>
                <span class="m-vs live-ind">🔴</span>
                <span class="m-team right">${teamName(m.away)}</span>
              </div>${refText}
            </div>
            <div class="m-state-col live-col">EN COURS</div>
          </div>`;
        });
      });
    } else {
      uh=`<div class="empty-msg">Tous les matchs sont terminés</div>`;
    }
  } else {
    // Passe 1 — matchs EN COURS, terrain par terrain
    fieldNums.forEach(f=>{
      const livOnField=DATA.matches.filter(m=>isLiveM(m)&&m.field===f&&m.home!=='TBD'&&m.away!=='TBD');
      if(!livOnField.length) return;
      uh+=`<div class="terrain-sep">🏟 Terrain ${f}</div>`;
      livOnField.forEach(m=>{
        const refText=m.referee?`<div class="ref-tag live-ref">👨‍⚖️ ${m.referee}</div>`:'';
        uh+=`<div class="match-row islive">
          <div class="live-dot"></div>
          <div class="m-time-col">${m2t(m.time)}</div>
          <div class="m-center">
            <div class="m-teams-row">
              <span class="m-team">${teamName(m.home)}</span>
              <span class="m-vs live-ind">🔴</span>
              <span class="m-team right">${teamName(m.away)}</span>
            </div>${refText}
          </div>
          <div class="m-state-col live-col">EN COURS</div>
        </div>`;
      });
    });
    // Passe 2 — prochain match par terrain (1 seul par terrain)
    fieldNums.forEach(f=>{
      const nextOnField=DATA.matches.filter(m=>!m.played&&m.time!=null&&m.field===f&&m.home!=='TBD'&&m.away!=='TBD'&&!isLiveM(m))
        .sort((a,b)=>a.time-b.time).slice(0,1);
      if(!nextOnField.length) return;
      uh+=`<div class="terrain-sep">🏟 Terrain ${f}</div>`;
      nextOnField.forEach(m=>{
        const refText=m.referee?`<div class="ref-tag">👨‍⚖️ ${m.referee}</div>`:'';
        uh+=`<div class="match-row upcoming">
          <div class="m-time-col">${m2t(m.time)}</div>
          <div class="m-center">
            <div class="m-teams-row">
              <span class="m-team">${teamName(m.home)}</span>
              <span class="m-vs">vs</span>
              <span class="m-team right">${teamName(m.away)}</span>
            </div>${refText}
          </div>
          <div class="m-state-col next-col">SUIVANT</div>
        </div>`;
      });
    });
    if(!uh) uh=`<div class="empty-msg">Aucun match planifié</div>`;
  }

  // Résultats récents — groupés par terrain, 4 derniers
  const done=DATA.matches.filter(m=>m.played).sort((a,b)=>b.time-a.time).slice(0,4);
  let dh='';
  if(done.length){
    const doneFields=[...new Set(done.map(m=>m.field))].sort((a,b)=>a-b);
    doneFields.forEach(f=>{
      dh+=`<div class="terrain-sep">🏟 Terrain ${f}</div>`;
      done.filter(m=>m.field===f).forEach(m=>{
        const hW=m.homeScore>m.awayScore;
        dh+=`<div class="match-row done">
          <div class="m-time-col">${m2t(m.time)}</div>
          <div class="m-center">
            <div class="m-teams-row">
              <span class="m-team${hW?' won':''}">${teamName(m.home)}</span>
              <span class="m-score-final">${m.homeScore} – ${m.awayScore}</span>
              <span class="m-team right${!hW?' won':''}">${teamName(m.away)}</span>
            </div>
          </div>
          <div class="m-state-col done-col">T${m.field}</div>
        </div>`;
      });
    });
  }
  if(!dh) dh=`<div class="empty-msg">Aucun résultat encore</div>`;

  document.getElementById('live-upcoming').innerHTML=uh;
  document.getElementById('live-done').innerHTML=dh;

  // Ticker — message Admin prioritaire (identique Admin)
  const ticker=document.getElementById('ticker-text');
  if(DATA.tickerMsg&&DATA.tickerMsg.trim()){
    ticker.textContent=DATA.tickerMsg.trim();
  } else if(done.length){
    ticker.textContent=done.slice(0,5).map(m=>`${teamName(m.home)} ${m.homeScore}–${m.awayScore} ${teamName(m.away)}`).join('   ·   ');
  } else {
    ticker.textContent=`🏐 ${DATA.cfg.name||'Tournoi'} — Suivez le direct ici !`;
  }
}

function matchRow(m, extraStyle=''){
  const played=m.played;
  const hWin=played && m.homeScore>m.awayScore;
  const aWin=played && m.awayScore>m.homeScore;
  const timeStr=m2t(m.time);
  let phaseBadge='';
  if(['main','main_3rd','main_final'].includes(m.phase)) phaseBadge='<span class="badge b-main">Princ.</span>';
  else if(['consol','consol_3rd','consol_final'].includes(m.phase)) phaseBadge='<span class="badge b-consol">Consol.</span>';
  return `<div class="match-row"${extraStyle}>
    <div class="m-team ${hWin?'won':played&&!hWin?'lost':''}">${teamName(m.home)}</div>
    <div class="m-score-wrap">
      <div class="m-score-meta">${timeStr}${m.field?' · T'+m.field:''}${phaseBadge}</div>
      <div class="m-score ${played?'':'notplayed'}">${played?m.homeScore+' – '+m.awayScore:'VS'}</div>
    </div>
    <div class="m-team right ${aWin?'won':played&&!aWin?'lost':''}">${teamName(m.away)}</div>
  </div>`;
}

// ── CALCULS DE CLASSEMENT — copie exacte de l'Admin ─────────────────────────
function computeStandings(){
  const m={};
  DATA.teams.forEach(t=>m[t.id]={id:t.id,name:t.name,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0});
  const ptsW=DATA.cfg.ptsW??3, ptsD=DATA.cfg.ptsD??1, ptsL=DATA.cfg.ptsL??0;
  DATA.matches.filter(x=>x.phase==='pool'&&x.played).forEach(x=>{
    const h=m[x.home],a=m[x.away];
    if(!h||!a)return;
    h.p++;a.p++;h.gf+=x.homeScore;h.ga+=x.awayScore;a.gf+=x.awayScore;a.ga+=x.homeScore;
    if(x.homeScore>x.awayScore){h.w++;h.pts+=ptsW;a.l++;a.pts+=ptsL;}
    else if(x.homeScore<x.awayScore){a.w++;a.pts+=ptsW;h.l++;h.pts+=ptsL;}
    else{h.d++;h.pts+=ptsD;a.d++;a.pts+=ptsD;}
  });
  return m;
}

function computeFinalStandings(phase){
  const m={};
  const phaseMs=DATA.matches.filter(x=>x.phase===phase);
  const teams=new Set([...phaseMs.map(x=>x.home),...phaseMs.map(x=>x.away)]).values();
  for(const tid of teams){
    const t=DATA.teams.find(x=>x.id===tid);
    if(t)m[tid]={id:tid,name:t.name,p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
  }
  const ptsW=DATA.cfg.ptsW??3,ptsD=DATA.cfg.ptsD??1,ptsL=DATA.cfg.ptsL??0;
  phaseMs.filter(x=>x.played).forEach(x=>{
    const h=m[x.home],a=m[x.away];if(!h||!a)return;
    h.p++;a.p++;h.gf+=x.homeScore;h.ga+=x.awayScore;a.gf+=x.awayScore;a.ga+=x.homeScore;
    if(x.homeScore>x.awayScore){h.w++;h.pts+=ptsW;a.l++;a.pts+=ptsL;}
    else if(x.homeScore<x.awayScore){a.w++;a.pts+=ptsW;h.l++;h.pts+=ptsL;}
    else{h.d++;h.pts+=ptsD;a.d++;a.pts+=ptsD;}
  });
  return m;
}

// ── RENDU : Onglet Classement — calqué sur renderDisplay() Admin ─────────────
// 3 phases identiques à l'Admin :
//   Phase 1 (poules en cours)  → classement par poule
//   Phase 2 (phase finale)     → Principale + Consolante
//   Phase 3 (finales terminées)→ résultats des 4 finales
function renderStandings(){
  const out=document.getElementById('standings-out');
  if(!DATA||!DATA.matches) return;

  // ── Variables d'état identiques à renderDisplay() Admin ──
  const poolMatches=DATA.matches.filter(m=>m.phase==='pool');
  const finalMatches=DATA.matches.filter(m=>m.phase==='main'||m.phase==='consol'||m.phase==='main_final'||m.phase==='main_3rd'||m.phase==='consol_final'||m.phase==='consol_3rd');
  const poolDone=poolMatches.every(m=>m.played);

  const _finalPhases=['main_final','main_3rd','consol_final','consol_3rd'];
  const _phasesPresent=_finalPhases.filter(ph=>DATA.matches.some(m=>m.phase===ph));
  const _specialDone=_phasesPresent.length>0&&
    _phasesPresent.every(ph=>DATA.matches.filter(m=>m.phase===ph).every(m=>m.played&&m.homeScore!=null&&m.awayScore!=null));
  const _finalsToDisplay=_specialDone||(DATA.finalsValidated===true);

  let sh='';

  // ══ Phase 3 : Finales terminées ══
  if(_finalsToDisplay){
    function finalMatchHTML(m){
      if(!m) return `<div class="st-final-row tbd"><span>—</span><span>? – ?</span><span>—</span></div>`;
      const hW=m.played&&m.homeScore>m.awayScore;
      const aW=m.played&&m.awayScore>m.homeScore;
      const sc=m.played?`${m.homeScore} – ${m.awayScore}`:'VS';
      const t=m.time!=null?`<span class="st-final-time">${m2t(m.time)}</span>`:'';
      return `<div class="st-final-row${m.played?' played':m.home==='TBD'?' tbd':' upcoming'}">
        ${t}
        <span class="st-final-team${hW?' won':''}">${teamName(m.home)}</span>
        <span class="st-final-score">${sc}</span>
        <span class="st-final-team right${aW?' won':''}">${teamName(m.away)}</span>
      </div>`;
    }
    const _finalMeta={
      'main_final':  {label:'🏆 Finale Principale',  color:'var(--gold)'},
      'main_3rd':    {label:'🥉 Petite Finale Principale', color:'var(--gold)'},
      'consol_final':{label:'🏅 Finale Consolante',  color:'var(--purple)'},
      'consol_3rd':  {label:'4️⃣ Petite Finale Consolante',color:'var(--purple)'},
    };
    const _order=['consol_3rd','main_3rd','consol_final','main_final'];
    _order.forEach(phase=>{
      const m=DATA.matches.find(x=>x.phase===phase);
      if(!m) return;
      const meta=_finalMeta[phase];
      sh+=`<div class="card"><div class="card-hd" style="color:${meta.color}">${meta.label}</div>${finalMatchHTML(m)}</div>`;
    });

  // ══ Phase 2 : Phase finale en cours ══
  } else if(poolDone&&finalMatches.length>0){
    const mainStMap=computeFinalStandings('main');
    if(Object.keys(mainStMap).length){
      const rows=Object.values(mainStMap).sort((a,b)=>(b.pts-a.pts)||((b.gf-b.ga)-(a.gf-a.ga))||(b.gf-a.gf));
      sh+=`<div class="card"><div class="card-hd" style="color:var(--gold)">🥇 Poule Principale</div>`;
      sh+=`<div class="st-row header"><span>#</span><span>Équipe</span><span>J</span><span>V</span><span>D</span><span>Pts</span></div>`;
      rows.forEach((s,ri)=>{
        const medal=ri===0?'🥇':ri===1?'🥈':ri===2?'🥉':'';
        sh+=`<div class="st-row"><span>${medal||ri+1}</span><span>${s.name}</span><span>${s.p}</span><span>${s.w}</span><span>${s.l}</span><span class="st-pts">${s.pts}</span></div>`;
      });
      sh+=`</div>`;
    }
    const consolStMap=computeFinalStandings('consol');
    if(Object.keys(consolStMap).length){
      const rows=Object.values(consolStMap).sort((a,b)=>(b.pts-a.pts)||((b.gf-b.ga)-(a.gf-a.ga))||(b.gf-a.gf));
      sh+=`<div class="card"><div class="card-hd" style="color:var(--purple)">🥈 Poule Consolante</div>`;
      sh+=`<div class="st-row header"><span>#</span><span>Équipe</span><span>J</span><span>V</span><span>D</span><span>Pts</span></div>`;
      rows.forEach((s,ri)=>{
        const medal=ri===0?'🥇':ri===1?'🥈':ri===2?'🥉':'';
        sh+=`<div class="st-row"><span>${medal||ri+1}</span><span>${s.name}</span><span>${s.p}</span><span>${s.w}</span><span>${s.l}</span><span class="st-pts">${s.pts}</span></div>`;
      });
      sh+=`</div>`;
    }

  // ══ Phase 1 : Poules en cours ══
  } else {
    const stMap=computeStandings();
    DATA.pools.forEach((pool,pi)=>{
      const rows=[...pool].sort((a,b)=>{
        const sa=stMap[a.id]||{pts:0,gf:0,ga:0},sb=stMap[b.id]||{pts:0,gf:0,ga:0};
        return(sb.pts-sa.pts)||((sb.gf-sb.ga)-(sa.gf-sa.ga))||(sb.gf-sa.gf);
      });
      const cutoff=Math.ceil(pool.length/2);
      sh+=`<div class="card"><div class="card-hd">Poule ${String.fromCharCode(65+pi)}</div>`;
      sh+=`<div class="st-row header"><span>#</span><span>Équipe</span><span>J</span><span>V</span><span>D</span><span>Pts</span></div>`;
      rows.forEach((t,ri)=>{
        const s=stMap[t.id]||{p:0,w:0,d:0,l:0,pts:0};
        const isMain=ri<cutoff;
        sh+=`<div class="st-row${isMain?' st-main':''}">
          <span style="color:var(--muted);font-size:.7rem">${ri+1}</span>
          <span>${t.name}${isMain?'<span style="color:var(--gold);font-size:.55rem;margin-left:.3rem">★</span>':''}</span>
          <span>${s.p}</span><span>${s.w}</span><span>${s.l}</span>
          <span class="st-pts">${s.pts}</span>
        </div>`;
        if(ri===cutoff-1&&ri<rows.length-1) sh+=`<div class="st-sep"></div>`;
      });
      sh+=`</div>`;
    });
  }

  if(!sh) sh='<div class="empty-msg">En attente des poules…</div>';
  out.innerHTML=sh;
}

// ── RENDU : Onglet Planning — même règle que l'Admin ───────────────────────
// Les matchs de phase finale n'apparaissent que lorsque les poules sont terminées.
function renderPlanning(){
  const out=document.getElementById('planning-out');
  const poolMatches=DATA.matches.filter(m=>m.phase==='pool');
  const poolDone=poolMatches.length>0&&poolMatches.every(m=>m.played);

  // Peupler le select avec les équipes visibles selon poolDone
  const sel=document.getElementById('planning-team-filter');
  if(sel){
    const prev=sel.value;
    // Même logique que l'Admin : n'exposer que les équipes des matchs visibles
    const visibleMatches=DATA.matches.filter(m=>m.time!=null&&(m.phase==='pool'||poolDone));
    const teams=[...new Set(visibleMatches.flatMap(m=>[m.home,m.away]).filter(id=>id&&id!=='TBD'))];
    teams.sort((a,b)=>(DATA.teams.find(t=>t.id===a)?.name||a).localeCompare(DATA.teams.find(t=>t.id===b)?.name||b));
    sel.innerHTML='<option value="">📋 Toutes les équipes</option>';
    teams.forEach(id=>{ const n=teamName(id); sel.innerHTML+=`<option value="${id}"${id===prev?' selected':''}>${n}</option>`; });
  }
  const filterTeam=sel?sel.value:'';

  // Phase de poules uniquement si pas encore terminée
  let sorted=DATA.matches.filter(m=>m.time!=null&&(m.phase==='pool'||poolDone))
    .sort((a,b)=>a.time-b.time);
  if(filterTeam) sorted=sorted.filter(m=>m.home===filterTeam||m.away===filterTeam);

  const title=filterTeam?`📋 Planning — ${teamName(filterTeam)}`:'📋 Planning complet';
  let html=`<div class="card"><div class="card-hd">${title}</div>`;

  // Séparer poules et phase finale pour affichage structuré (comme Admin)
  const poolSorted=sorted.filter(m=>m.phase==='pool');
  const finalSorted=sorted.filter(m=>m.phase!=='pool');

  poolSorted.forEach(m=>{ html+=matchRow(m); });

  if(poolDone&&finalSorted.length){
    html+=`</div><div class="card"><div class="card-hd">🏆 Phase Finale</div>`;
    finalSorted.forEach(m=>{ html+=matchRow(m); });
  }

  html+='</div>';
  out.innerHTML=sorted.length?html:'<div class="empty-msg">Aucun match disponible</div>';
}

// ── RENDU : Onglet Arbitres — même règle que l'Admin ───────────────────────
// Les matchs de phase finale n'apparaissent qu'une fois les poules terminées.
function renderArbitres(){
  const out=document.getElementById('arbitres-out');
  const poolMatches=DATA.matches.filter(m=>m.phase==='pool');
  const poolDone=poolMatches.length>0&&poolMatches.every(m=>m.played);

  // N'inclure les matchs hors poules que si poules terminées — identique à l'Admin
  const visibleMatches=DATA.matches.filter(m=>
    m.referee&&m.time!=null&&m.home!=='TBD'&&m.away!=='TBD'&&
    (m.phase==='pool'||poolDone)
  );

  const sel=document.getElementById('arbitres-ref-filter');
  if(sel){
    const prev=sel.value;
    const refs=[...new Set(visibleMatches.map(m=>m.referee))].sort();
    sel.innerHTML='<option value="">⚖️ Tous les arbitres</option>';
    refs.forEach(r=>{ sel.innerHTML+=`<option value="${r}"${r===prev?' selected':''}>${r}</option>`; });
  }
  const filterRef=sel?sel.value:'';
  const byRef={};
  visibleMatches.filter(m=>!filterRef||m.referee===filterRef).forEach(m=>{
    if(!byRef[m.referee]) byRef[m.referee]=[];
    byRef[m.referee].push(m);
  });
  let html='';
  Object.keys(byRef).sort().forEach(ref=>{
    const matches=byRef[ref].sort((a,b)=>a.time-b.time);
    html+=`<div class="card"><div class="card-hd">⚖️ ${ref}</div>`;
    matches.forEach(m=>{ html+=matchRow(m); });
    html+='</div>';
  });
  out.innerHTML=html||'<div class="empty-msg">Aucune affectation d&#39;arbitre</div>';
}

function renderAll(){
  if(!DATA) return;
  document.getElementById('tournament-name').textContent = DATA.cfg.name || 'Tournoi';
  renderLive();
  renderStandings();
  renderPlanning();
  renderArbitres();
}

  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen().catch(()=>{});
  }
}
